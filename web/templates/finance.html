{{ define "finance" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/static/index.min.css">
</head>
<body>
    <div>
        <div>
            <h2 hx-get="/home" hx-target="body">
                Family
            </h2>
        </div>
        {{ if .FinanceTrack }}
            {{ template "finance-track" .FinanceTrack }}
        {{ else  }}
            {{ template "finance-feed" .FinanceFeed }}
        {{ end }}
        <div>
        </div>
        <div>
            <button class="nb-button orange" hx-post="/logout" hx-target="body">logout</button>
        </div>
    </div>
    <script src="/static/htmx.min.js"></script>
</body>
</html>
{{ end }}
